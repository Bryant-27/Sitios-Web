<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pagina Flexbox</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background-color:#f4f4f4;
        }

        header{
            background-color:#222;
            color:white;
            padding:20px;
            text-align:center;
        }

        nav{
            display:flex;
            justify-content:center;
            gap:20px;
            background:#444;
            padding:10px;
        }

        nav a{
            color:white;
            text-decoration:none;
            padding:8px 15px;
            transition:0.3s;
        }

        nav a:hover{
            background:white;
            color:black;
            border-radius:5px;
        }

        .contenedor{
            display:flex;
            justify-content:space-around;
            padding:40px;
        }

        .card{
            background:white;
            padding:20px;
            width:250px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.05);
        }

        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:15px;
        }
    </style>
</head>
<body>

<header>
    <h1>Mi Página con Flexbox</h1>
</header>

<nav>
    <a href="#">Inicio</a>
    <a href="#">Servicios</a>
    <a href="#">Contacto</a>
</nav>

<section class="contenedor">
    <div class="card">
        <h3>Card 1</h3>
        <p>Contenido de ejemplo.</p>
    </div>
    <div class="card">
        <h3>Card 2</h3>
        <p>Contenido de ejemplo.</p>
    </div>
    <div class="card">
        <h3>Card 3</h3>
        <p>Contenido de ejemplo.</p>
    </div>
</section>

<footer>
    © 2026 - Página de prueba
</footer>

</body>
</html>
