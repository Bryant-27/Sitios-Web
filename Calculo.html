<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Notas - Meta 7.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --target: #7.0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .calculator-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
        }

        h1 {
            color: #1e293b;
            text-align: center;
            margin-bottom: 30px;
        }

        .row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 40px;
            gap: 12px;
            margin-bottom: 15px;
            animation: fadeIn 0.4s ease;
        }

        input {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }

            input:focus {
                outline: none;
                border-color: var(--primary);
                box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            }

        .btn-add {
            width: 100%;
            padding: 15px;
            border: none;
            background: #f1f5f9;
            color: var(--primary);
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 25px;
            transition: background 0.3s;
        }

            .btn-add:hover {
                background: #e2e8f0;
            }

        .result-box {
            background: #1e293b;
            color: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
        }

        .score-big {
            font-size: 4rem;
            font-weight: 700;
            display: block;
            margin: 10px 0;
            color: #fbbf24;
        }

        .status-msg {
            font-size: 0.95rem;
            font-weight: 300;
            opacity: 0.9;
        }

        .approved {
            color: var(--success) !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="calculator-card">
        <h1>Objetivo: 7.0</h1>

        <div id="rows-container">
            <div class="row">
                <input type="text" placeholder="Actividad" value="Examen 1">
                <input type="number" placeholder="Nota" class="nota" step="0.1" min="0">
                <input type="number" placeholder="%" class="peso" min="0" max="100">
                <div style="width: 40px"></div>
            </div>
        </div>

        <button class="btn-add" onclick="addRow()">+ Añadir otra actividad</button>

        <div class="result-box">
            <span class="status-msg" id="status-text">Ingresa tus notas para calcular</span>
            <span class="score-big" id="final-score">0.0</span>
            <div id="needed-text"></div>
        </div>
    </div>

    <script>
        function addRow() {
            const container = document.getElementById('rows-container');
            const div = document.createElement('div');
            div.className = 'row';
            div.innerHTML = `
                <input type="text" placeholder="Actividad">
                <input type="number" placeholder="Nota" class="nota" step="0.1" min="0">
                <input type="number" placeholder="%" class="peso" min="0" max="100">
                <button onclick="this.parentElement.remove(); update();" style="border:none; background:none; cursor:pointer; font-size:1.2rem; color:#94a3b8">×</button>
            `;
            container.appendChild(div);
        }

        function update() {
            const notas = document.querySelectorAll('.nota');
            const pesos = document.querySelectorAll('.peso');
            let totalScore = 0;
            let totalWeight = 0;

            for (let i = 0; i < notas.length; i++) {
                const n = parseFloat(notas[i].value) || 0;
                const p = parseFloat(pesos[i].value) || 0;
                totalScore += (n * p) / 100;
                totalWeight += p;
            }

            const scoreElement = document.getElementById('final-score');
            const statusElement = document.getElementById('status-text');
            const neededElement = document.getElementById('needed-text');

            scoreElement.innerText = totalScore.toFixed(2);

            
            if (totalScore >= 7) {
                scoreElement.classList.add('approved');
                statusElement.innerText = "¡FELICIDADES, APROBADO!";
            } else {
                scoreElement.classList.remove('approved');
                statusElement.innerText = "AÚN NO LLEGAS AL 7.0";
            }

            
            const remainingWeight = 100 - totalWeight;
            if (remainingWeight > 0) {
                const required = ((7 - totalScore) * 100) / remainingWeight;
                if (required <= 0) {
                    neededElement.innerText = "Ya aseguraste el 7.0";
                } else if (required > 10) {
                    neededElement.innerText = "Necesitas más de un 10 en lo que falta (Imposible)";
                } else {
                    neededElement.innerText = `Necesitas promedio de ${required.toFixed(2)} en el ${remainingWeight}% restante.`;
                }
            } else {
                neededElement.innerText = totalScore >= 7 ? "Curso completado con éxito" : "Curso finalizado por debajo de la meta";
            }
        }

        document.getElementById('rows-container').addEventListener('input', update);
    </script>

</body>
</html>
