<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargador de Imágenes Moderno</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: #1e293b;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .drop-area {
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: 2rem;
            background: #f1f5f9;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

            .drop-area.active {
                border-color: var(--primary);
                background: #eef2ff;
            }

            .drop-area p {
                color: #64748b;
                margin: 10px 0;
            }

        #file-input {
            display: none;
        }


        #preview-container {
            margin-top: 2rem;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        #image-preview {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .btn-reset {
            margin-top: 1rem;
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Subir Imagen</h1>

        <div class="drop-area" id="drop-zone">
            <p>📷</p>
            <p>Arrastra tu imagen aquí o <strong>haz clic para buscar</strong></p>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div id="preview-container">
            <img id="image-preview" src="" alt="Vista previa">
            <button class="btn-reset" onclick="resetPage()">Eliminar y subir otra</button>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const imagePreview = document.getElementById('image-preview');


        dropZone.onclick = () => fileInput.click();


        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            handleFile(file);
        };


        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.classList.add('active');
        };

        dropZone.ondragleave = () => {
            dropZone.classList.remove('active');
        };

        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('active');
            const file = e.dataTransfer.files[0];
            handleFile(file);
        };


        function handleFile(file) {
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();

                reader.onload = (e) => {
                    imagePreview.src = e.target.result;
                    previewContainer.style.display = 'block';
                    dropZone.style.display = 'none';
                };

                reader.readAsDataURL(file);
            } else {
                alert("Por favor, selecciona un archivo de imagen válido.");
            }
        }

        function resetPage() {
            location.reload();
        }
    </script>
</body>
</html>
