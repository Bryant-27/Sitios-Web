<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pagina Grid</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:linear-gradient(to right, #667eea, #764ba2);
    color:white;
}

.grid-container{
    display:grid;
    grid-template-columns:1fr 3fr;
    grid-template-rows:auto 1fr auto;
    height:100vh;
}

header{
    grid-column:1/3;
    background:#111;
    padding:20px;
    text-align:center;
}

aside{
    background:#222;
    padding:20px;
}

main{
    padding:40px;
}

footer{
    grid-column:1/3;
    background:#111;
    text-align:center;
    padding:15px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    background:white;
    color:#333;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:black;
    color:white;
}
</style>
</head>

<body>

<div class="grid-container">
    <header>
        <h1>Layout con Grid</h1>
    </header>

    <aside>
        <h3>Menú</h3>
        <p>Opción 1</p>
        <p>Opción 2</p>
    </aside>

    <main>
        <h2>Contenido Principal</h2>
        <p>Este es el espacio principal.</p>
        <button>Presioname</button>
    </main>

    <footer>
        © 2026 Grid Layout
    </footer>
</div>

</body>
</html>
