<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario Animado</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
}

.formulario{
    background:white;
    padding:40px;
    border-radius:15px;
    width:300px;
    animation:entrada 1s ease;
}

@keyframes entrada{
    from{
        opacity:0;
        transform:translateY(-50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:2px solid #ccc;
    border-radius:5px;
    transition:0.3s;
}

input:focus{
    border-color:#0072ff;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    background:#0072ff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0051b3;
}
</style>
</head>

<body>

<div class="formulario">
    <h2>Registro</h2>
    <input type="text" placeholder="Nombre">
    <input type="email" placeholder="Correo">
    <input type="password" placeholder="Contraseña">
    <button>Enviar</button>
</div>

</body>
</html>
